name: gear-update

on:
  schedule:
    - cron: "0 */2 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生成日历文件
        run: |
          mkdir -p public
          python splatoon3_gear_reminders.py -o public/gear.ics
          cp site/index.html public/index.html
          echo "日历文件:"
          ls -la public/gear.ics
          echo "首页:"
          ls -la public/index.html

      - name: 上传 Pages 构件
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
